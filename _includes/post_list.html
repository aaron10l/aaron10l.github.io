{% if site.posts.size > 0 %}
  {% assign id = 0 %}
  <ul>
    {% for post in site.posts %}
      {% assign id = id | plus:1 %}
      <li class="post-list-item" id="{{ id }}">
        <span class="home-date">
          {{ post.date | date: site.theme_config.date_format }}»
        </span>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
{% endif %}
